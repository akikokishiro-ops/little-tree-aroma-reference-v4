<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <circle cx="96" cy="96" r="90" fill="#5f8f72" opacity="0.15"/>
  
  <!-- Main tree shape with leaves (stylized for aroma/reference concept) -->
  <g transform="translate(96, 96)">
    <!-- Trunk -->
    <rect x="-8" y="20" width="16" height="30" fill="#8b7355" rx="4"/>
    
    <!-- Foliage - three overlapping circles suggesting a tree -->
    <circle cx="0" cy="-10" r="28" fill="#5f8f72"/>
    <circle cx="-20" cy="8" r="24" fill="#6fa085"/>
    <circle cx="20" cy="8" r="24" fill="#6fa085"/>
    
    <!-- Aroma/scent indicator - small spirals or dots -->
    <circle cx="-30" cy="-20" r="4" fill="#d4a574" opacity="0.8"/>
    <circle cx="30" cy="-20" r="4" fill="#d4a574" opacity="0.8"/>
    <circle cx="0" cy="-40" r="4" fill="#d4a574" opacity="0.8"/>
  </g>
  
  <!-- Safe zone indicator for maskable icons -->
  <circle cx="96" cy="96" r="50" fill="none" stroke="#5f8f72" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
</svg>
